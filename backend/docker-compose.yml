version: "3.9"

services:
  forum-backend:
    build: .
    container_name: forum-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/forum.db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forum-api.rule=Host(`bigmoneychina.tech`) && PathPrefix(`/register`, `/payment`, `/tg`, `/health`)"
      - "traefik.http.routers.forum-api.tls=true"
      - "traefik.http.routers.forum-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.forum-api.loadbalancer.server.port=8000"
